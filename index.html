<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>currently.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo+Black&family=Archivo:ital,wght@0,300;0,400;0,500;1,300&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0905;
    --bg2:       #111009;
    --bg3:       #1a1810;
    --border:    rgba(255, 160, 40, 0.12);
    --border2:   rgba(255, 160, 40, 0.28);
    --text:      #f0e8d5;
    --text2:     #a89878;
    --text3:     #5a5040;
    --red:       #d42a1a;
    --orange:    #e8720a;
    --amber:     #f0a820;
    --sky:       #7ab8d4;
    --sunset-top:    #8b1a4a;
    --sunset-mid:    #d44020;
    --sunset-bot:    #f07818;
    --display: 'Bebas Neue', 'Archivo Black', sans-serif;
    --head: 'Archivo Black', sans-serif;
    --body: 'Archivo', sans-serif;
    --mono: 'Share Tech Mono', monospace;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    font-weight: 300;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.04;
    pointer-events: none;
    z-index: 1000;
  }

  /* sunset hero strip */
  .hero-strip {
    width: 100%;
    height: 180px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, #5a1035 0%, #b03020 38%, #e86010 65%, #f0a010 85%, #1a1408 100%);
    margin-bottom: -40px;
  }

  /* city silhouette */
  .hero-strip::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 70px;
    background: var(--bg);
    clip-path: polygon(
      0% 100%, 0% 55%, 2% 55%, 2% 35%, 3% 35%, 3% 55%,
      5% 55%, 5% 20%, 6% 20%, 6% 55%,
      8% 55%, 8% 40%, 9% 40%, 9% 30%, 10% 30%, 10% 40%, 11% 40%, 11% 55%,
      13% 55%, 13% 42%, 14% 42%, 14% 55%,
      16% 55%, 16% 25%, 17% 25%, 17% 15%, 18% 15%, 18% 25%, 19% 25%, 19% 55%,
      21% 55%, 21% 45%, 23% 45%, 23% 55%,
      25% 55%, 25% 30%, 26% 30%, 26% 20%, 27.5% 20%, 27.5% 30%, 29% 30%, 29% 55%,
      31% 55%, 31% 48%, 33% 48%, 33% 55%,
      35% 55%, 35% 35%, 36% 35%, 36% 55%,
      38% 55%, 38% 22%, 39% 22%, 39% 12%, 40% 12%, 40% 22%, 41% 22%, 41% 55%,
      44% 55%, 44% 42%, 46% 42%, 46% 55%,
      48% 55%, 48% 38%, 49% 38%, 49% 55%,
      51% 55%, 51% 28%, 52% 28%, 52% 18%, 53% 18%, 53% 28%, 54% 28%, 54% 55%,
      56% 55%, 56% 44%, 58% 44%, 58% 55%,
      60% 55%, 60% 32%, 61% 32%, 61% 55%,
      63% 55%, 63% 20%, 64% 20%, 64% 10%, 65% 10%, 65% 20%, 66% 20%, 66% 55%,
      68% 55%, 68% 40%, 70% 40%, 70% 55%,
      72% 55%, 72% 48%, 74% 48%, 74% 55%,
      76% 55%, 76% 28%, 77% 28%, 77% 55%,
      79% 55%, 79% 38%, 80% 38%, 80% 55%,
      82% 55%, 82% 22%, 83% 22%, 83% 14%, 84% 14%, 84% 22%, 85% 22%, 85% 55%,
      87% 55%, 87% 42%, 89% 42%, 89% 55%,
      91% 55%, 91% 30%, 92% 30%, 92% 55%,
      94% 55%, 94% 45%, 96% 45%, 96% 55%,
      98% 55%, 98% 35%, 99% 35%, 99% 55%,
      100% 55%, 100% 100%
    );
  }

  /* horizontal scan line across sunset */
  .hero-strip::before {
    content: '';
    position: absolute;
    bottom: 68px; left: 0; right: 0;
    height: 1px;
    background: rgba(240, 160, 20, 0.35);
  }

  .page {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 32px 120px;
    position: relative;
  }

  /* ── HEADER ── */
  header {
    padding-top: 56px;
    margin-bottom: 60px;
    position: relative;
  }

  .wordmark {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--orange);
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.8;
  }

  .tagline {
    font-family: var(--display);
    font-size: clamp(52px, 8vw, 96px);
    font-weight: 400;
    line-height: 0.92;
    letter-spacing: 0.02em;
    color: var(--text);
    text-transform: uppercase;
    position: relative;
  }

  /* red outline shadow — classic anime title treatment */
  .tagline .outline {
    -webkit-text-stroke: 2px var(--red);
    color: transparent;
    display: block;
  }

  .tagline .solid {
    display: block;
    color: var(--text);
  }

  .tagline .accent {
    display: block;
    color: var(--orange);
  }

  .timestamp {
    margin-top: 20px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.12em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .timestamp::before {
    content: '';
    display: inline-block;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--orange);
    opacity: 0.6;
  }

  /* ── SECTION HEADERS ── */
  .section { margin-bottom: 44px; }

  .section-label {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .section-label-text {
    font-family: var(--display);
    font-size: 22px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text2);
  }

  .section-label-text.run  { color: var(--red); }
  .section-label-text.book { color: var(--amber); }
  .section-label-text.game { color: var(--sky); }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .section-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.1em;
  }

  /* ── CARDS ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 22px 26px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, background 0.2s;
  }

  .card:hover { border-color: var(--border2); background: var(--bg3); }

  /* top accent bar — thick like a manga panel border */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .card.run::before  { background: var(--red); }
  .card.book::before { background: var(--amber); }
  .card.game::before { background: var(--sky); }

  /* diagonal slash decoration */
  .card::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 28px 28px 0;
  }
  .card.run::after  { border-color: transparent var(--red) transparent transparent; opacity: 0.5; }
  .card.book::after { border-color: transparent var(--amber) transparent transparent; opacity: 0.4; }
  .card.game::after { border-color: transparent var(--sky) transparent transparent; opacity: 0.35; }

  .card-eyebrow {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .card-title {
    font-family: var(--head);
    font-size: 20px;
    line-height: 1.2;
    margin-bottom: 5px;
    color: var(--text);
  }

  .card-sub {
    font-size: 13px;
    color: var(--text2);
    font-style: italic;
    margin-bottom: 16px;
  }

  /* ── STATS ── */
  .stat-row {
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .stat { display: flex; flex-direction: column; gap: 2px; }

  .stat-value {
    font-family: var(--display);
    font-size: 26px;
    letter-spacing: 0.04em;
    color: var(--text);
    line-height: 1;
  }

  .stat-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }

  /* ── PROGRESS BAR ── */
  .progress-wrap { margin-top: 16px; }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .progress-track {
    height: 4px;
    background: var(--bg3);
    border-radius: 0;
    overflow: hidden;
    position: relative;
  }

  /* tick marks every 25% */
  .progress-track::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      90deg,
      transparent,
      transparent calc(25% - 1px),
      rgba(255,255,255,0.08) calc(25% - 1px),
      rgba(255,255,255,0.08) 25%
    );
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--amber), var(--orange));
    width: 0%;
    transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
    position: relative;
    z-index: 1;
  }

  /* ── RUNS LIST ── */
  .runs-list { display: flex; flex-direction: column; gap: 8px; }

  .run-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 2px;
    border-left: 3px solid var(--red);
    transition: background 0.15s;
  }

  .run-row:hover { background: var(--bg3); }
  .run-row-left { display: flex; flex-direction: column; gap: 2px; }
  .run-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .run-date { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.08em; }
  .run-stats { display: flex; gap: 20px; }
  .run-stat { font-family: var(--mono); font-size: 12px; color: var(--text2); }
  .run-stat strong { color: var(--text); font-weight: 400; }

  /* ── GAMES GRID ── */
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }

  .game-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 2px;
    border-left: 3px solid var(--sky);
    padding: 13px 15px;
    transition: background 0.15s, border-color 0.15s;
  }

  .game-card:hover { background: var(--bg3); border-color: var(--border2); }

  .game-name {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 5px;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  .game-hours { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.05em; }

  /* ── SKELETON ── */
  .skeleton {
    background: linear-gradient(90deg, var(--bg3) 0%, rgba(255,160,40,0.04) 50%, var(--bg3) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.8s infinite;
    border-radius: 2px;
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .error-note {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 0.05em;
    padding: 16px 0;
  }

  /* ── PAGE LOAD ANIMATION ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  header  { animation: fadeUp 0.5s ease both; }
  .section:nth-child(1) { animation: fadeUp 0.5s 0.1s ease both; }
  .section:nth-child(2) { animation: fadeUp 0.5s 0.2s ease both; }
  .section:nth-child(3) { animation: fadeUp 0.5s 0.3s ease both; }

  @media (max-width: 600px) {
    .page { padding: 0 18px 80px; }
    .hero-strip { height: 130px; }
    .stat-row { gap: 18px; }
    .run-stats { gap: 12px; }
  }
</style>
</head>
<body>

<div class="hero-strip"></div>

<div class="page">

  <header>
    <div class="wordmark">// status update</div>
    <h1 class="tagline">
      <span class="solid">what</span>
      <span class="outline">I'm doing</span>
      <span class="accent">right now</span>
    </h1>
    <div class="timestamp" id="last-updated">loading...</div>
  </header>

  <!-- READING -->
  <div class="section">
    <div class="section-label">
      <span class="section-num">01</span>
      <span class="section-label-text book">Reading</span>
    </div>
    <div class="card book" id="book-card">
      <div class="card-eyebrow">currently reading</div>
      <div class="card-title skeleton" style="height:24px;width:62%;margin-bottom:8px;"></div>
      <div class="card-sub skeleton" style="height:14px;width:38%;margin-bottom:18px;"></div>
      <div class="progress-wrap">
        <div class="progress-meta"><span></span><span></span></div>
        <div class="progress-track"><div class="progress-fill" id="book-progress"></div></div>
      </div>
    </div>
  </div>

  <!-- RUNNING -->
  <div class="section">
    <div class="section-label">
      <span class="section-num">02</span>
      <span class="section-label-text run">Running</span>
    </div>
    <div class="card run" id="run-summary-card" style="margin-bottom:10px;">
      <div class="card-eyebrow">last 4 weeks</div>
      <div class="stat-row" id="run-stats">
        <div class="stat"><div class="stat-value skeleton" style="width:64px;height:26px;"></div><div class="stat-label">km</div></div>
        <div class="stat"><div class="stat-value skeleton" style="width:40px;height:26px;"></div><div class="stat-label">runs</div></div>
        <div class="stat"><div class="stat-value skeleton" style="width:88px;height:26px;"></div><div class="stat-label">avg pace</div></div>
      </div>
    </div>
    <div class="runs-list" id="runs-list"></div>
  </div>

  <!-- GAMING -->
  <div class="section">
    <div class="section-label">
      <span class="section-num">03</span>
      <span class="section-label-text game">Gaming</span>
    </div>
    <div class="games-grid" id="games-grid">
      <div class="game-card"><div class="game-name skeleton" style="height:15px;width:80%;margin-bottom:6px;"></div><div class="game-hours skeleton" style="height:11px;width:50%;"></div></div>
      <div class="game-card"><div class="game-name skeleton" style="height:15px;width:68%;margin-bottom:6px;"></div><div class="game-hours skeleton" style="height:11px;width:42%;"></div></div>
      <div class="game-card"><div class="game-name skeleton" style="height:15px;width:88%;margin-bottom:6px;"></div><div class="game-hours skeleton" style="height:11px;width:55%;"></div></div>
    </div>
  </div>

</div>

<script>
const fmt = {
  date: d => new Date(d * 1000).toLocaleDateString('en-GB', { day:'numeric', month:'short' }),
  pace: secs => {
    const m = Math.floor(secs / 60), s = Math.round(secs % 60);
    return `${m}:${s.toString().padStart(2,'0')}/km`;
  },
  dist: m => (m / 1000).toFixed(1),
  hours: s => {
    const h = Math.round(s / 3600);
    return h >= 1 ? `${h}h` : `${Math.round(s/60)}m`;
  }
};

async function fetchAll() {
  const [bookRes, stravaRes, steamRes] = await Promise.allSettled([
    fetch('/api/books').then(r => r.json()),
    fetch('/api/strava').then(r => r.json()),
    fetch('/api/steam').then(r => r.json()),
  ]);

  renderBook(bookRes.status === 'fulfilled' ? bookRes.value : null);
  renderStrava(stravaRes.status === 'fulfilled' ? stravaRes.value : null);
  renderSteam(steamRes.status === 'fulfilled' ? steamRes.value : null);

  document.getElementById('last-updated').textContent =
    'updated ' + new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}

function renderBook(data) {
  const card = document.getElementById('book-card');
  if (!data || data.error) {
    card.innerHTML = `<div class="card-eyebrow">currently reading</div><div class="error-note">// couldn't load reading data — check Goodreads profile is public</div>`;
    return;
  }
  const pct = data.percent || (data.page && data.pages ? Math.round(data.page / data.pages * 100) : 0);
  card.innerHTML = `
    <div class="card-eyebrow">currently reading</div>
    <div class="card-title">${data.title}</div>
    <div class="card-sub">${data.author}</div>
    ${pct || data.page ? `
    <div class="progress-wrap">
      <div class="progress-meta">
        <span>${data.page && data.pages ? `pg ${data.page} / ${data.pages}` : `${pct}% complete`}</span>
        <span>${pct}%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="book-progress"></div></div>
    </div>` : ''}
  `;
  requestAnimationFrame(() => {
    const fill = document.getElementById('book-progress');
    if (fill) fill.style.width = pct + '%';
  });
}

function renderStrava(data) {
  const statsEl = document.getElementById('run-stats');
  const listEl  = document.getElementById('runs-list');
  if (!data || data.error) {
    statsEl.innerHTML = `<div class="error-note">// couldn't load Strava data</div>`;
    return;
  }
  const { totals, recent } = data;
  statsEl.innerHTML = `
    <div class="stat"><div class="stat-value">${fmt.dist(totals.distance)}</div><div class="stat-label">km</div></div>
    <div class="stat"><div class="stat-value">${totals.count}</div><div class="stat-label">runs</div></div>
    <div class="stat"><div class="stat-value">${fmt.pace(totals.avg_pace)}</div><div class="stat-label">avg pace</div></div>
    <div class="stat"><div class="stat-value">${fmt.hours(totals.moving_time)}</div><div class="stat-label">time</div></div>
  `;
  listEl.innerHTML = (recent || []).slice(0, 4).map(r => `
    <div class="run-row">
      <div class="run-row-left">
        <div class="run-name">${r.name}</div>
        <div class="run-date">${fmt.date(r.start_date_local_ts)}</div>
      </div>
      <div class="run-stats">
        <div class="run-stat"><strong>${fmt.dist(r.distance)}km</strong></div>
        <div class="run-stat"><strong>${fmt.pace(r.average_speed_pace)}</strong></div>
        <div class="run-stat"><strong>${fmt.hours(r.moving_time)}</strong></div>
      </div>
    </div>
  `).join('');
}

function renderSteam(data) {
  const grid = document.getElementById('games-grid');
  if (!data || data.error || !data.games) {
    grid.innerHTML = `<div class="error-note">// couldn't load Steam data</div>`;
    return;
  }
  grid.innerHTML = data.games.map(g => `
    <div class="game-card">
      <div class="game-name">${g.name}</div>
      <div class="game-hours">${g.playtime_2weeks ? fmt.hours(g.playtime_2weeks * 60) + ' recent · ' : ''}${Math.round(g.playtime_forever / 60)}h total</div>
    </div>
  `).join('');
}

fetchAll();
</script>
</body>
</html>
